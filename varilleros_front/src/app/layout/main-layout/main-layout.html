<div class="flex h-screen overflow-hidden bg-surface-50">

  <!-- Sidebar fijo — solo desktop (≥ lg) -->
  <aside class="hidden lg:flex lg:flex-col lg:w-[260px] flex-shrink-0 bg-surface-0 border-r border-surface-200">
    <app-sidebar />
  </aside>

  <!-- Área principal -->
  <div class="flex flex-col flex-1 min-w-0 overflow-hidden">
    <app-topbar (menuToggle)="drawerVisible.set(true)" />
    <main class="flex-1 overflow-auto p-4 md:p-6">
      <router-outlet />
    </main>
  </div>

</div>

<!-- Drawer móvil / tablet (< lg) -->
<p-drawer
  [visible]="drawerVisible()"
  (visibleChange)="drawerVisible.set($event)"
  position="left"
  [modal]="true"
  [style]="{ width: '260px', padding: '0' }"
>
  <ng-template #headless>
    <app-sidebar />
  </ng-template>
</p-drawer>
