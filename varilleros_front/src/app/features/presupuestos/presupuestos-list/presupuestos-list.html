<app-page-header title="Presupuestos" />

<p-table
  [value]="items()"
  [loading]="loading()"
  stripedRows
  responsiveLayout="scroll"
  styleClass="p-datatable-sm"
>
  <ng-template #header>
    <tr>
      <th>ID</th>
      <th>Cliente</th>
      <th>Perito</th>
      <th>Fecha</th>
      <th class="text-right">Total (€)</th>
      <th class="text-center">Estado</th>
    </tr>
  </ng-template>
  <ng-template #body let-item>
    <tr>
      <td class="font-mono text-sm text-surface-500">#{{ item.id }}</td>
      <td class="font-medium">{{ item.nombreCliente }}</td>
      <td>{{ item.idPerito }}</td>
      <td>{{ fechaToDate(item.fechaCreacion) }}</td>
      <td class="text-right font-semibold">{{ item.precioTotal | number:'1.2-2' }}</td>
      <td class="text-center">
        <p-tag [value]="estadoLabel(item.estado)" [severity]="estadoSeverity(item.estado)" />
      </td>
    </tr>
  </ng-template>
  <ng-template #emptymessage>
    <tr>
      <td colspan="6">
        <app-empty-state message="No hay presupuestos registrados" />
      </td>
    </tr>
  </ng-template>
</p-table>
