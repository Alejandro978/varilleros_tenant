<form [formGroup]="form" (ngSubmit)="save()" class="flex flex-col gap-4">
  <div class="flex flex-col gap-1">
    <label class="text-sm font-medium">Código *</label>
    <input pInputText formControlName="codigo" placeholder="ART-001" class="w-full" />
  </div>
  <div class="flex flex-col gap-1">
    <label class="text-sm font-medium">Descripción *</label>
    <input pInputText formControlName="descripcion" placeholder="Descripción del artículo" class="w-full" />
  </div>
  <div class="flex flex-col gap-1">
    <label class="text-sm font-medium">Código Precio Presupuesto</label>
    <input pInputText formControlName="codigoPrecioPresupuesto" placeholder="Código de tarifa" class="w-full" />
  </div>
  <div class="flex justify-end gap-2 pt-2">
    <p-button label="Cancelar" severity="secondary" type="button" (click)="cancelled.emit()" />
    <p-button label="Guardar" type="submit" [disabled]="form.invalid" />
  </div>
</form>
