<form [formGroup]="form" (ngSubmit)="save()" class="flex flex-col gap-4">
  <div class="flex flex-col gap-1">
    <label class="text-sm font-medium">Código *</label>
    <input pInputText formControlName="code" placeholder="CLIENTES" class="w-full" />
    @if (item()) {
      <small class="text-surface-400">El código no se puede modificar</small>
    }
  </div>
  <div class="flex flex-col gap-1">
    <label class="text-sm font-medium">Nombre *</label>
    <input pInputText formControlName="name" placeholder="Gestión de Clientes" class="w-full" />
  </div>
  <div class="flex flex-col gap-1">
    <label class="text-sm font-medium">Descripción</label>
    <input pInputText formControlName="description" placeholder="Descripción del módulo" class="w-full" />
  </div>
  <div class="flex items-center gap-3">
    <label class="text-sm font-medium">Estado</label>
    <p-togglebutton formControlName="isActive" onLabel="Activo" offLabel="Inactivo" />
  </div>
  <div class="flex justify-end gap-2 pt-2">
    <p-button label="Cancelar" severity="secondary" type="button" (click)="cancelled.emit()" />
    <p-button label="Guardar" type="submit" [disabled]="form.invalid" />
  </div>
</form>
