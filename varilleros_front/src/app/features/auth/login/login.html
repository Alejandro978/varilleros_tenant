<div class="flex items-center justify-center min-h-screen bg-surface-100">
  <p-card styleClass="w-full max-w-sm shadow-lg">
    <ng-template #header>
      <div class="flex flex-col items-center pt-6 pb-2">
        <i class="pi pi-wrench text-primary text-4xl mb-2"></i>
        <h1 class="text-2xl font-bold text-surface-900">Varilleros</h1>
        <p class="text-sm text-surface-500 mt-1">Acceso al sistema</p>
      </div>
    </ng-template>

    <form [formGroup]="form" (ngSubmit)="submit()" class="flex flex-col gap-4">

      <div class="flex flex-col gap-1">
        <label class="text-sm font-medium text-surface-700">Empresa</label>
        <input
          pInputText
          formControlName="slug"
          placeholder="mi-taller"
          autocomplete="username"
          class="w-full"
        />
        <small class="text-surface-400">El identificador único de tu empresa</small>
      </div>

      <div class="flex flex-col gap-1">
        <label class="text-sm font-medium text-surface-700">Contraseña</label>
        <p-password
          formControlName="password"
          [feedback]="false"
          [toggleMask]="true"
          styleClass="w-full"
          inputStyleClass="w-full"
          placeholder="••••••••"
          autocomplete="current-password"
        />
      </div>

      <p-button
        label="Entrar"
        type="submit"
        icon="pi pi-sign-in"
        styleClass="w-full mt-2"
        [loading]="loading"
        [disabled]="form.invalid"
      />
    </form>
  </p-card>
</div>
